name: CI/CD Pipeline Inmutable (GitHub Packages + Java Buildpacks)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-or-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Ejecutar Release Please para automatizar versiones y PRs (Configurado para Maven)
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: maven

      # 2. Descargar el código (solo si se creó una nueva release)
      - name: Checkout del código
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      # 3. Autenticación en GHCR (solo si se creó una nueva release)
      - name: Autenticación en GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. CORRECCIÓN: Instalar el CLI oficial de Buildpacks (Pack)
      - name: Instalar Pack CLI
        if: ${{ steps.release.outputs.release_created }}
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      # 5. Construir y subir la imagen de Java inyectando las 3 etiquetas a GHCR
      - name: Construir y Subir con Cloud-Native Buildpacks
        if: ${{ steps.release.outputs.release_created }}
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ steps.release.outputs.version }}"
          SHA="${{ github.sha }}"
          
          # 'pack build' construye de manera limpia y usa '--publish' para subirlo
          # directo al registro donde nos autenticamos en el Paso 3.
          pack build $IMAGE_NAME:$VERSION \
            --builder paketobuildpacks/builder-jammy-base:latest \
            --tag $IMAGE_NAME:$SHA \
            --tag $IMAGE_NAME:latest \
            --publish