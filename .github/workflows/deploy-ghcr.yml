name: CI/CD Spring Boot con Buildpacks hacia GHCR

on:
  push:
    branches: [ "main" ]

# Permisos requeridos para interactuar con GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    # SOLUCON AL ERROR: Darle permisos de ejecución al Maven Wrapper explícitamente
    - name: Dar permisos de ejecucion a mvnw
      run: chmod +x ./mvnw

    # Paso 3: Construir la imagen localmente
    - name: Construir Imagen localmente con Buildpacks
      run: |
        # Forzamos todo el nombre del repositorio a minúsculas para cumplir con el estándar de Docker
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        ./mvnw spring-boot:build-image \
          -Dspring-boot.build-image.imageName=$IMAGE_NAME:latest

    # Paso 4: Iniciar sesión en GHCR antes del push
    - name: Iniciar sesión en GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }} 
        password: ${{ secrets.GITHUB_TOKEN }} 

    # Paso 5: Publicar usando el CLI de Docker con la sesión ya iniciada
    - name: Publicar Imagen en GHCR
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        docker push $IMAGE_NAME:latest