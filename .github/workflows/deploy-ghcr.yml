name: CI/CD Pipeline Inmutable (GitHub Packages + Java Buildpacks)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-or-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Ejecutar Release Please para automatizar versiones y PRs (Configurado para Maven)
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: maven

      # 2. Descargar el código (solo si se creó una nueva release)
      - name: Checkout del código
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      # 3. Autenticación en GHCR (solo si se creó una nueva release)
      - name: Autenticación en GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Construir y subir la imagen usando la Acción Oficial de Buildpacks
      # Reemplaza por completo el 'docker/build-push-action' usando el compilador inmutable de Java
      - name: Construir y Subir con Cloud-Native Buildpacks
        if: ${{ steps.release.outputs.release_created }}
        uses: buildpacks/github-actions@v2
        with:
          # Usamos el constructor oficial de Paketo para aplicaciones Java/Spring Boot
          builder: 'paketobuildpacks/builder-jammy-base:latest'
          
          # Convertimos automáticamente el repositorio a minúsculas para evitar fallos de Docker
          image: 'ghcr.io/${{ github.repository }}'
          
          # Definimos las etiquetas idénticas a tu flujo inmutable de Node
          tag: '${{ steps.release.outputs.tag_name }},${{ github.sha }},latest'