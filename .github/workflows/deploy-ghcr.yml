name: CI/CD Spring Boot con Buildpacks hacia GHCR

on:
  push:
    branches: [ "main" ]

# 1. IMPORTANTE: Le damos permisos al flujo para escribir en el registro de paquetes de GitHub
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    # Paso 3: Iniciar sesión en GitHub Container Registry (ghcr.io)
    # Usamos el token automático que GitHub nos da en cada ejecución
    - name: Iniciar sesión en GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }} # Usa automáticamente tu nombre de usuario de GitHub
        password: ${{ secrets.GITHUB_TOKEN }} # Token automático temporal

    # Paso 4: Pasar el nombre de la imagen en minúsculas y compilar con Buildpacks
    # El formato obligatorio de GHCR es: ghcr.io/tu-usuario/nombre-imagen:tag
    - name: Construir y Publicar Imagen en GHCR
      run: |
        # GitHub obliga a que el nombre del usuario esté en minúsculas en el registro, esto lo asegura:
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        ./mvnw spring-boot:build-image \
          -Dspring-boot.build-image.imageName=$IMAGE_NAME:latest \
          -Dspring-boot.build-image.publish=true