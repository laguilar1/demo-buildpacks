name: Deploy to GHCR (Java Buildpacks)

on:
  release:
    types: [published] # <-- Corre SOLO cuando la release ya está firmada y creada

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código en el tag de la release
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar JDK 26
      - name: Configurar JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Autenticación en GHCR
      - name: Autenticación en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Construir y subir la imagen usando Cloud-Native Buildpacks
      - name: Construir y Publicar con Buildpacks
        run: |
          BASE_IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Obtenemos la versión directamente del tag del evento de la release
          VERSION_LIMPIA="${{ github.event.release.tag_name }}"
          # Si el tag viene con 'v' (ej. v1.0.0), limpiamos la 'v' si tu pom no la lleva:
          VERSION_LIMPIA="${VERSION_LIMPIA#v}"
          
          echo "Construyendo contenedores inmutables para la versión: $VERSION_LIMPIA"
          
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=$BASE_IMAGE_NAME:$VERSION_LIMPIA,$BASE_IMAGE_NAME:latest \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.publishRegistry.username=${{ github.repository_owner }} \
            -Dspring-boot.build-image.publishRegistry.password=${{ secrets.GITHUB_TOKEN }}