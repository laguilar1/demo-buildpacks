name: CI/CD Pipeline Inmutable (GHCR + Docker Hub)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-or-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Ejecutar Release Please
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: maven

      # 2. Descargar el código
      - name: Checkout del código
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      # 3. Autenticación en GHCR
      - name: Autenticación en GHCR
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3.5 NUEVO: Autenticación en Docker Hub
      - name: Autenticación en Docker Hub
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Instalar el CLI oficial de Buildpacks (Pack)
      - name: Instalar Pack CLI
        if: ${{ steps.release.outputs.release_created }}
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      # 5. Construir localmente y distribuir a ambos registros
      - name: Construir y Publicar (GHCR + Docker Hub)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Variables para GHCR
          GHCR_IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Variables para Docker Hub
          REPO_NAME=$(basename "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          HUB_IMAGE="${{ secrets.DOCKER_USERNAME }}/$REPO_NAME"
          
          VERSION="${{ steps.release.outputs.version }}"
          SHA="${{ github.sha }}"
          
          echo "--- 1. CONSTRUYENDO IMAGEN LOCALMENTE ---"
          # Se omite --publish para que se quede en el motor de Docker de GitHub Actions
          pack build $GHCR_IMAGE:$VERSION \
            --builder paketobuildpacks/builder-jammy-base:latest \
            --env BP_JVM_VERSION=26 \
            --tag $GHCR_IMAGE:$SHA \
            --tag $GHCR_IMAGE:latest
          
          echo "--- 2. DESPLEGANDO EN GITHUB PACKAGES (GHCR) ---"
          docker push $GHCR_IMAGE:$VERSION
          docker push $GHCR_IMAGE:$SHA
          docker push $GHCR_IMAGE:latest
          
          echo "--- 3. ETIQUETANDO PARA DOCKER HUB ---"
          # Tomamos la imagen recién creada y le ponemos el nombre para Docker Hub
          docker tag $GHCR_IMAGE:$VERSION $HUB_IMAGE:$VERSION
          docker tag $GHCR_IMAGE:$VERSION $HUB_IMAGE:$SHA
          docker tag $GHCR_IMAGE:$VERSION $HUB_IMAGE:latest
          
          echo "--- 4. DESPLEGANDO EN DOCKER HUB ---"
          docker push $HUB_IMAGE:$VERSION
          docker push $HUB_IMAGE:$SHA
          docker push $HUB_IMAGE:latest