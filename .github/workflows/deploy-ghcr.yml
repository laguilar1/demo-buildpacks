name: CI/CD Spring Boot con Buildpacks hacia GHCR

on:
  push:
    branches: [ "main" ]

# IMPORTANTE: Permisos para escribir en el registro de paquetes de GitHub
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Configurar JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    # Paso 3: Construir la imagen y guardarla en el Docker local de GitHub Actions
    # Eliminamos publish=true para que se quede en el entorno local
    - name: Construir Imagen localmente con Buildpacks
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        ./mvnw spring-boot:build-image \
          -Dspring-boot.build-image.imageName=$IMAGE_NAME:latest

    # Paso 4: Iniciar sesión en GHCR usando la acción oficial
    - name: Iniciar sesión en GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }} 
        password: ${{ secrets.GITHUB_TOKEN }} 

    # Paso 5: Empujar la imagen al registro usando el CLI de Docker
    - name: Publicar Imagen en GHCR
      run: |
        IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        docker push $IMAGE_NAME:latest